<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>うちゅうドライブ</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: #0b0a2a;
    font-family: "Hiragino Maru Gothic ProN", "Hiragino Sans", sans-serif;
    -webkit-user-select: none; user-select: none;
    -webkit-tap-highlight-color: transparent;
  }
  #wrap {
    position: relative;
    width: 100vw; height: 100%;
    max-width: 640px;
    margin: 0 auto;
    overflow: hidden;
  }
  canvas { display: block; width: 100%; height: 100%; }

  /* かさなる がめん（スタート・おしまい） */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    text-align: center;
    color: #fff;
    padding: 24px;
    gap: 18px;
  }
  .hidden { display: none !important; }

  .title {
    font-size: clamp(30px, 10vw, 56px);
    font-weight: 800;
    letter-spacing: 2px;
    text-shadow: 0 3px 0 #3b2ea0, 0 0 22px rgba(120,140,255,.7);
  }
  .sub { font-size: clamp(15px, 4.5vw, 20px); opacity: .95; line-height: 1.7; }

  .btn {
    font-family: inherit;
    font-size: clamp(22px, 6.5vw, 30px);
    font-weight: 800;
    color: #2a1a5e;
    background: linear-gradient(#ffe37a, #ffc93c);
    border: none;
    border-radius: 999px;
    padding: 16px 44px;
    box-shadow: 0 6px 0 #c9962a, 0 10px 22px rgba(0,0,0,.35);
    cursor: pointer;
    transition: transform .08s, box-shadow .08s;
  }
  .btn:active { transform: translateY(4px); box-shadow: 0 2px 0 #c9962a, 0 4px 10px rgba(0,0,0,.35); }

  .stars { font-size: clamp(40px, 13vw, 72px); letter-spacing: 8px; line-height: 1; }
  .praise { font-size: clamp(22px, 6.5vw, 32px); font-weight: 800; text-shadow: 0 2px 0 #3b2ea0; }
  .result { font-size: clamp(15px, 4.5vw, 19px); opacity: .95; }

  /* あそびかた の ちいさな ふきだし */
  .hint {
    position: absolute; left: 50%; top: 14px; transform: translateX(-50%);
    color: #fff; font-size: clamp(14px, 4vw, 18px); font-weight: 700;
    background: rgba(20,18,60,.55); padding: 8px 18px; border-radius: 999px;
    white-space: nowrap;
    animation: bob 1.1s ease-in-out infinite;
  }
  @keyframes bob { 0%,100%{ transform: translateX(-50%) translateY(0);} 50%{ transform: translateX(-50%) translateY(-5px);} }

  /* うえの じょうほう（ほしの かず） */
  #hud {
    position: absolute; top: 12px; right: 14px;
    color: #fff; font-size: clamp(18px, 5vw, 24px); font-weight: 800;
    text-shadow: 0 2px 4px rgba(0,0,0,.5);
  }
  #hud.hidden { display: none; }
</style>

<div id="wrap">
  <canvas id="cv"></canvas>

  <div id="hud" class="hidden">⭐ <span id="starcount">0</span></div>
  <div id="hint" class="hint hidden">タップで ジャンプ！</div>

  <!-- スタートがめん -->
  <div id="startScreen" class="screen">
    <div class="title">うちゅうドライブ</div>
    <div class="sub">タップで ジャンプして<br>ほしを あつめよう！</div>
    <button id="startBtn" class="btn">スタート</button>
  </div>

  <!-- おしまいがめん -->
  <div id="endScreen" class="screen hidden">
    <div class="praise" id="praise">とうちゃく！</div>
    <div class="stars" id="starRating">⭐⭐⭐</div>
    <div class="result" id="resultText">ほしを あつめたよ</div>
    <button id="againBtn" class="btn">もういちど</button>
  </div>
</div>

<script>
(function () {
  "use strict";

  var cv = document.getElementById("cv");
  var ctx = cv.getContext("2d");
  var wrap = document.getElementById("wrap");

  var startScreen = document.getElementById("startScreen");
  var endScreen = document.getElementById("endScreen");
  var hud = document.getElementById("hud");
  var hint = document.getElementById("hint");
  var starCountEl = document.getElementById("starcount");
  var starRatingEl = document.getElementById("starRating");
  var praiseEl = document.getElementById("praise");
  var resultTextEl = document.getElementById("resultText");

  // ---- びょうがサイズ（Retina たいおう）----
  var W = 0, H = 0, DPR = 1;
  function resize() {
    DPR = Math.min(window.devicePixelRatio || 1, 2);
    W = wrap.clientWidth;
    H = wrap.clientHeight;
    cv.width = Math.round(W * DPR);
    cv.height = Math.round(H * DPR);
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    computeLayout();
  }
  window.addEventListener("resize", resize);

  // ---- レイアウト（がめんサイズから けいさん）----
  var groundY, vehX, vehW, vehH, jumpV, gravity;
  function computeLayout() {
    groundY = H * 0.80;                 // じめんの たかさ
    vehW = Math.max(46, Math.min(72, W * 0.16));
    vehH = vehW * 0.72;
    vehX = W * 0.22;                    // のりものの よこいち（こてい）
    // ジャンプ：やく 0.62びょうで さいこうてんへ、ゆったり
    gravity = H * 2.4;                  // px/s^2
    jumpV = -Math.sqrt(2 * gravity * (H * 0.30)); // さいだい たかさ ≒ がめんの30%
  }

  // ---- ゲームじょうたい ----
  var state = "start"; // start | play | end
  var worldX = 0;      // すすんだ きょり（px）
  var goalX = 0;       // ゴールまでの きょり
  var speed = 0;       // px/s（よこスクロール）
  var vehY = 0;        // じめんからの たかさ（px, +でうえ）
  var vehVy = 0;
  var onGround = true;
  var stumbleT = 0;    // つまづき ざんり じかん
  var obstacles = [];  // {x, w, h, type, hit}
  var stars = [];      // {x, y, got}
  var totalStars = 0;
  var gotStars = 0;
  var goalReached = false;
  var arriveT = 0;     // ゴールえんしゅつ じかん
  var tilt = 0;        // のりものの かたむき（つまづき えんしゅつ）
  var bgStars = [];    // せかいの ほしぞら（そうしょく）
  var wheelSpin = 0;

  // かんたんな けっていろんてき レベル（ほしのかずが きまる＝こうへいな ひょうか）
  function buildLevel() {
    obstacles = [];
    stars = [];
    var x = W * 1.1;                 // さいしょは すこし あけて
    var gapMin = W * 0.62, gapMax = W * 0.92;
    var seed = 12345;
    function rnd() { seed = (seed * 1103515245 + 12345) & 0x7fffffff; return seed / 0x7fffffff; }
    var count = 9;                 // しょうがいぶつの かず（1しゅう やく20びょう）
    // ほしの たかさ：ジャンプの アーチが かならず とおる バンド（とれる たかさ）
    var starLow = groundY - H * 0.20;
    var starHigh = groundY - H * 0.26;
    for (var i = 0; i < count; i++) {
      var type = rnd() < 0.5 ? "rock" : "crystal";
      var h = (type === "rock" ? 0.07 : 0.10) * H + rnd() * H * 0.03;
      var w = vehW * (type === "rock" ? 0.9 : 0.55);
      obstacles.push({ x: x, w: w, h: h, type: type, hit: false });
      var gap = gapMin + rnd() * (gapMax - gapMin);
      // しょうがいぶつを こえた すぐ さきに ほし（ジャンプの アーチで とれる）
      stars.push({ x: x + w * 0.5 + gap * 0.14, y: starHigh, got: false });
      // ときどき たいらな ところにも ひくめの ほし
      if (rnd() < 0.55) {
        stars.push({ x: x + w * 0.5 + gap * 0.55, y: starLow, got: false });
      }
      x += gap;
    }
    goalX = x + W * 0.5;
    totalStars = stars.length;
    gotStars = 0;

    // そうしょくの ほしぞら
    bgStars = [];
    for (var s = 0; s < 60; s++) {
      bgStars.push({ x: rnd() * W, y: rnd() * groundY, r: rnd() * 1.6 + 0.4, tw: rnd() * 6.28 });
    }
  }

  function startGame() {
    computeLayout();
    buildLevel();
    worldX = 0;
    speed = W * 0.45;      // すすむ はやさ
    vehY = 0; vehVy = 0; onGround = true;
    stumbleT = 0; tilt = 0;
    goalReached = false; arriveT = 0;
    state = "play";
    startScreen.classList.add("hidden");
    endScreen.classList.add("hidden");
    hud.classList.remove("hidden");
    starCountEl.textContent = "0";
    hint.classList.remove("hidden");
    setTimeout(function () { hint.classList.add("hidden"); }, 2600);
  }

  function endGame() {
    state = "end";
    hud.classList.add("hidden");
    hint.classList.add("hidden");
    // こうへいな ひょうか：あつめた ほし ÷ でた ほし
    var ratio = totalStars > 0 ? gotStars / totalStars : 1;
    var rating, praise;
    if (ratio >= 0.8) { rating = 3; praise = "だいせいこう！"; }
    else if (ratio >= 0.4) { rating = 2; praise = "とっても じょうず！"; }
    else { rating = 1; praise = "うちゅうに とうちゃく！"; }
    var full = "⭐⭐⭐".slice(0, rating);
    var empty = "☆☆☆".slice(0, 3 - rating);
    starRatingEl.textContent = full + empty;
    praiseEl.textContent = praise;
    resultTextEl.textContent = "ほしを " + gotStars + "こ あつめたよ！　よく がんばったね";
    endScreen.classList.remove("hidden");
    beep(660, 0.12, 0.0); beep(880, 0.14, 0.12); beep(1180, 0.18, 0.26);
  }

  // ---- おと（Web Audio, そとぶファイル ふよう）----
  var actx = null;
  function beep(freq, dur, delay) {
    try {
      if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
      var t = actx.currentTime + (delay || 0);
      var o = actx.createOscillator(), g = actx.createGain();
      o.type = "sine"; o.frequency.value = freq;
      g.gain.setValueAtTime(0.0001, t);
      g.gain.exponentialRampToValueAtTime(0.18, t + 0.02);
      g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
      o.connect(g); g.connect(actx.destination);
      o.start(t); o.stop(t + dur + 0.02);
    } catch (e) {}
  }

  // ---- そうさ：タップで ジャンプ ----
  function jump() {
    if (state !== "play") return;
    if (onGround) {
      vehVy = jumpV;
      onGround = false;
      beep(520, 0.10, 0);
    }
  }
  wrap.addEventListener("pointerdown", function (e) {
    // ボタンの タップは のぞく
    if (e.target.closest && e.target.closest(".btn")) return;
    jump();
  });

  document.getElementById("startBtn").addEventListener("click", startGame);
  document.getElementById("againBtn").addEventListener("click", startGame);

  // ---- こうしん ----
  function update(dt) {
    if (state !== "play") return;

    var curSpeed = speed * (stumbleT > 0 ? 0.45 : 1);
    worldX += curSpeed * dt;
    wheelSpin += curSpeed * dt * 0.06;

    // ジャンプ ぶつり
    vehVy += gravity * dt;
    vehY -= vehVy * dt;
    if (vehY <= 0) { vehY = 0; vehVy = 0; onGround = true; }

    if (stumbleT > 0) { stumbleT -= dt; tilt = Math.sin(performance.now() * 0.03) * 0.18; }
    else { tilt *= 0.8; }

    // のりものの あたりはんてい ボックス（ゆるめ）
    var vLeft = vehX - vehW * 0.32;
    var vRight = vehX + vehW * 0.32;
    var vBottom = groundY - vehY;         // した
    var vTop = vBottom - vehH * 0.9;      // うえ

    // しょうがいぶつ
    for (var i = 0; i < obstacles.length; i++) {
      var o = obstacles[i];
      var ox = o.x - worldX;
      if (ox + o.w < -50) continue;
      if (ox > W + 50) break;
      if (!o.hit) {
        var oLeft = ox + o.w * 0.18, oRight = ox + o.w * 0.82;
        var oTop = groundY - o.h * 0.72;   // あたり はんてい ゆるめ
        if (vRight > oLeft && vLeft < oRight && vBottom > oTop) {
          o.hit = true;
          stumbleT = 0.5;
          beep(180, 0.16, 0);
        }
      }
    }

    // ほし
    for (var j = 0; j < stars.length; j++) {
      var s = stars[j];
      if (s.got) continue;
      var sx = s.x - worldX;
      if (sx < -40) continue;
      if (sx > W + 40) break;
      var dx = sx - vehX;
      var dy = s.y - (groundY - vehY - vehH * 0.5);
      var rr = vehW * 1.0;
      if (dx * dx + dy * dy < rr * rr) {
        s.got = true; gotStars++;
        starCountEl.textContent = String(gotStars);
        beep(1040, 0.10, 0);
      }
    }

    // ゴール はんてい
    if (!goalReached && worldX >= goalX) {
      goalReached = true;
    }
    if (goalReached) {
      arriveT += dt;
      if (arriveT > 0.9) { endGame(); }
    }
  }

  // ---- びょうが ----
  function draw() {
    // そら（グラデーション）
    var g = ctx.createLinearGradient(0, 0, 0, H);
    g.addColorStop(0, "#0a0836");
    g.addColorStop(0.6, "#241a63");
    g.addColorStop(1, "#3a2a72");
    ctx.fillStyle = g;
    ctx.fillRect(0, 0, W, H);

    // ほしぞら（そうしょく・きらきら）
    var now = performance.now() * 0.004;
    for (var b = 0; b < bgStars.length; b++) {
      var st = bgStars[b];
      var a = 0.5 + 0.5 * Math.sin(now + st.tw);
      ctx.globalAlpha = 0.3 + a * 0.6;
      ctx.fillStyle = "#fff";
      ctx.beginPath();
      ctx.arc((st.x - worldX * 0.15) % W < 0 ? ((st.x - worldX * 0.15) % W) + W : (st.x - worldX * 0.15) % W, st.y, st.r, 0, 6.28);
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // とおくの わくせい（そうしょく）
    drawPlanet(W * 0.78 - (worldX * 0.05) % (W * 1.6), H * 0.22, 34, "#7d6bd6", "#a99be0");

    // じめん
    var gg = ctx.createLinearGradient(0, groundY, 0, H);
    gg.addColorStop(0, "#5b3b7a");
    gg.addColorStop(1, "#3a2154");
    ctx.fillStyle = gg;
    ctx.fillRect(0, groundY, W, H - groundY);
    // じめんの ハイライト せん
    ctx.strokeStyle = "rgba(255,255,255,.18)";
    ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(0, groundY); ctx.lineTo(W, groundY); ctx.stroke();
    // じめんの もよう（クレーターの てん）
    ctx.fillStyle = "rgba(255,255,255,.08)";
    for (var d = 0; d < 8; d++) {
      var px = ((d * W * 0.31 - worldX * 0.6) % (W * 1.3));
      if (px < 0) px += W * 1.3;
      ctx.beginPath(); ctx.ellipse(px, groundY + (H - groundY) * 0.45, 26, 9, 0, 0, 6.28); ctx.fill();
    }

    // ゴール（うちゅうステーション）
    var goalScreenX = goalX - worldX;
    if (goalScreenX < W + 120) {
      drawGoal(goalScreenX, groundY);
    }

    // しょうがいぶつ
    for (var i = 0; i < obstacles.length; i++) {
      var o = obstacles[i];
      var ox = o.x - worldX;
      if (ox + o.w < -60 || ox > W + 60) continue;
      if (o.type === "rock") drawRock(ox, groundY, o.w, o.h);
      else drawCrystal(ox, groundY, o.w, o.h);
    }

    // ほし
    for (var j = 0; j < stars.length; j++) {
      var s = stars[j];
      if (s.got) continue;
      var sx = s.x - worldX;
      if (sx < -40 || sx > W + 40) continue;
      var fl = 0.85 + 0.15 * Math.sin(now * 2 + j);
      drawStar(sx, s.y + Math.sin(now + j) * 4, vehW * 0.28 * fl, "#ffe14d");
    }

    // のりもの
    drawVehicle(vehX, groundY - vehY, vehW, vehH, tilt);

    // ゴール えんしゅつ（きらり）：とうちゃくの あいだだけ ひからせ、end がめんは くらい うちゅうに もどす
    if (goalReached && state === "play") {
      ctx.globalAlpha = Math.min(0.55, arriveT * 0.7);
      ctx.fillStyle = "#fff";
      ctx.fillRect(0, 0, W, H);
      ctx.globalAlpha = 1;
    }
  }

  function drawPlanet(x, y, r, c1, c2) {
    var pg = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.2, x, y, r);
    pg.addColorStop(0, c1); pg.addColorStop(1, "#4b3a8f");
    ctx.fillStyle = pg;
    ctx.beginPath(); ctx.arc(x, y, r, 0, 6.28); ctx.fill();
    ctx.strokeStyle = "rgba(255,255,255,.25)"; ctx.lineWidth = 4;
    ctx.beginPath(); ctx.ellipse(x, y, r * 1.5, r * 0.4, -0.4, 0, 6.28); ctx.stroke();
  }

  function drawRock(x, gy, w, h) {
    ctx.fillStyle = "#8a7fb0";
    ctx.strokeStyle = "#c8bce8"; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x, gy);
    ctx.lineTo(x + w * 0.15, gy - h * 0.75);
    ctx.lineTo(x + w * 0.5, gy - h);
    ctx.lineTo(x + w * 0.85, gy - h * 0.65);
    ctx.lineTo(x + w, gy);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
  }

  function drawCrystal(x, gy, w, h) {
    ctx.fillStyle = "#5fe0d8";
    ctx.strokeStyle = "#c4fff9"; ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(x + w * 0.5, gy - h);
    ctx.lineTo(x + w, gy - h * 0.4);
    ctx.lineTo(x + w * 0.7, gy);
    ctx.lineTo(x + w * 0.3, gy);
    ctx.lineTo(x, gy - h * 0.4);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.globalAlpha = 0.5; ctx.fillStyle = "#fff";
    ctx.beginPath(); ctx.moveTo(x + w * 0.5, gy - h); ctx.lineTo(x + w * 0.62, gy - h * 0.45); ctx.lineTo(x + w * 0.5, gy - h * 0.2); ctx.closePath(); ctx.fill();
    ctx.globalAlpha = 1;
  }

  function drawGoal(x, gy) {
    ctx.save();
    // ポール
    ctx.strokeStyle = "#ffd54a"; ctx.lineWidth = 5;
    ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x, gy - H * 0.28); ctx.stroke();
    // ステーション（まる）
    var cy = gy - H * 0.30;
    var rg = ctx.createRadialGradient(x - 8, cy - 8, 6, x, cy, 30);
    rg.addColorStop(0, "#fff2b0"); rg.addColorStop(1, "#ffb03a");
    ctx.fillStyle = rg;
    ctx.beginPath(); ctx.arc(x, cy, 26, 0, 6.28); ctx.fill();
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.ellipse(x, cy, 40, 12, 0, 0, 6.28); ctx.stroke();
    // フラッグ もじ
    ctx.fillStyle = "#2a1a5e"; ctx.font = "800 16px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
    ctx.fillText("ゴール", x, cy);
    ctx.restore();
  }

  function drawStar(cx, cy, r, color) {
    ctx.save();
    ctx.translate(cx, cy);
    ctx.fillStyle = color;
    ctx.strokeStyle = "#fff6c0"; ctx.lineWidth = 2;
    ctx.beginPath();
    for (var i = 0; i < 5; i++) {
      var a = -Math.PI / 2 + i * (Math.PI * 2 / 5);
      var a2 = a + Math.PI / 5;
      ctx.lineTo(Math.cos(a) * r, Math.sin(a) * r);
      ctx.lineTo(Math.cos(a2) * r * 0.45, Math.sin(a2) * r * 0.45);
    }
    ctx.closePath(); ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  function drawVehicle(x, baseY, w, h, tl) {
    ctx.save();
    ctx.translate(x, baseY);
    ctx.rotate(tl);

    var bodyW = w, bodyH = h * 0.55;
    var by = -bodyH - h * 0.18; // ボディの うえ y（したが -h*0.18 に くる）

    // かげ
    ctx.globalAlpha = 0.28; ctx.fillStyle = "#000";
    ctx.beginPath(); ctx.ellipse(0, 2, w * 0.5, 6, 0, 0, 6.28); ctx.fill();
    ctx.globalAlpha = 1;

    // ロケットの ほのお（すすんでいる かんじ）
    var flick = 0.7 + Math.random() * 0.3;
    ctx.fillStyle = "#ff8a3c";
    ctx.beginPath();
    ctx.moveTo(-bodyW * 0.5, -h * 0.42);
    ctx.lineTo(-bodyW * 0.5 - w * 0.28 * flick, -h * 0.30);
    ctx.lineTo(-bodyW * 0.5, -h * 0.18);
    ctx.closePath(); ctx.fill();
    ctx.fillStyle = "#ffd84a";
    ctx.beginPath();
    ctx.moveTo(-bodyW * 0.5, -h * 0.40);
    ctx.lineTo(-bodyW * 0.5 - w * 0.16 * flick, -h * 0.30);
    ctx.lineTo(-bodyW * 0.5, -h * 0.20);
    ctx.closePath(); ctx.fill();

    // タイヤ
    ctx.fillStyle = "#2b2350";
    var wheelR = h * 0.22;
    var wy = -wheelR * 0.7;
    drawWheel(-bodyW * 0.28, wy, wheelR);
    drawWheel(bodyW * 0.30, wy, wheelR);

    // ボディ（まるっこい）
    var bg = ctx.createLinearGradient(0, by, 0, by + bodyH);
    bg.addColorStop(0, "#ff6f9c"); bg.addColorStop(1, "#e23f78");
    ctx.fillStyle = bg;
    roundRect(-bodyW * 0.5, by, bodyW, bodyH, bodyH * 0.4);
    ctx.fill();

    // まど（ドーム）
    ctx.fillStyle = "#bfe9ff";
    ctx.beginPath();
    ctx.ellipse(bodyW * 0.08, by + bodyH * 0.30, bodyW * 0.24, bodyH * 0.42, 0, Math.PI, 0);
    ctx.fill();
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2; ctx.stroke();
    // ほし マーク
    ctx.restore();

    // タイヤの ぐるぐる（べつ ざひょうで）
    function drawWheel(wx, wyy, r) {
      ctx.save();
      ctx.fillStyle = "#241d45";
      ctx.beginPath(); ctx.arc(wx, wyy, r, 0, 6.28); ctx.fill();
      ctx.fillStyle = "#8f86c0";
      ctx.beginPath(); ctx.arc(wx, wyy, r * 0.45, 0, 6.28); ctx.fill();
      ctx.strokeStyle = "#5b5290"; ctx.lineWidth = 2;
      for (var k = 0; k < 4; k++) {
        var a = wheelSpin + k * Math.PI / 2;
        ctx.beginPath(); ctx.moveTo(wx, wyy);
        ctx.lineTo(wx + Math.cos(a) * r * 0.8, wyy + Math.sin(a) * r * 0.8); ctx.stroke();
      }
      ctx.restore();
    }
  }

  function roundRect(x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x + r, y);
    ctx.arcTo(x + w, y, x + w, y + h, r);
    ctx.arcTo(x + w, y + h, x, y + h, r);
    ctx.arcTo(x, y + h, x, y, r);
    ctx.arcTo(x, y, x + w, y, r);
    ctx.closePath();
  }

  // ---- ループ ----
  var last = 0;
  function frame(t) {
    if (!last) last = t;
    var dt = Math.min((t - last) / 1000, 0.05);
    last = t;
    update(dt);
    draw();
    requestAnimationFrame(frame);
  }

  resize();
  buildLevel();   // スタートがめんの はいけい（ほしぞら）ように いちど つくる。ゴールは とおくで えがかれない
  requestAnimationFrame(frame);
})();
</script>
